<svg width="400" height="80" viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&amp;display=swap');
    .logo-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
    }
  </style>

  <!-- Rounded Square Icon -->
  <rect x="0" y="0" width="80" height="80" rx="24" fill="url(#logoGradient)" />
  
  <!-- S inside Icon -->
  <text x="40" y="60" fill="#FFFFFF" font-size="64" class="logo-text" text-anchor="middle">S</text>
  
  <!-- Layer 1: The main wordmark without the 'j' (White text for dark mode) -->
  <text x="96" y="60" fill="#FFFFFF" font-size="60" class="logo-text" letter-spacing="-1px">
    Sul<tspan fill="none">j</tspan>haoo
  </text>
  
  <!-- Layer 2: The white stem of the 'j' (clipped below y=27 to remove the native dot) -->
  <text x="96" y="60" fill="#FFFFFF" font-size="60" class="logo-text" letter-spacing="-1px" clip-path="url(#stemClip)">
    <tspan fill="none">Sul</tspan>j<tspan fill="none">haoo</tspan>
  </text>
  
  <!-- Layer 3: The pink dot natively generated by the font (clipped above y=27 to remove the stem) -->
  <text x="96" y="60" fill="#FF1880" font-size="60" class="logo-text" letter-spacing="-1px" clip-path="url(#dotClip)">
    <tspan fill="none">Sul</tspan>j<tspan fill="none">haoo</tspan>
  </text>
  
  <defs>
    <!-- Clip for the 'j' stem (preserves bottom, hides native dot completely) -->
    <clipPath id="stemClip">
      <rect x="0" y="27" width="400" height="60" />
    </clipPath>
    
    <!-- Clip for the 'j' dot (preserves top, hides stem) -->
    <clipPath id="dotClip">
      <rect x="0" y="0" width="400" height="27" />
    </clipPath>

    <!-- Brand Pink to Purple Gradient matching the image exactly -->
    <linearGradient id="logoGradient" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF1880" />
      <stop offset="50%" stop-color="#B623CE" />
      <stop offset="100%" stop-color="#4B30F0" />
    </linearGradient>
  </defs>
</svg>
